openapi: 3.0.3
info:
  title: RegistrationService API
  version: "0.0.1"
  description: "OpenAPI 3 spec for RegistrationService - User event registration and management"
  contact:
    name: VolunteerHub

servers:
  - url: http://localhost:8084
    description: Local development server
  - url: http://localhost:8080
    description: Alternative port

tags:
  - name: EventSnapshot
    description: Event snapshot metrics for managers
  - name: Registrations
    description: User-event registration endpoints
  - name: System
    description: System-level helpers

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserEventStatus:
      type: string
      enum:
        - PENDING
        - APPROVED
        - REJECTED
        - COMPLETED
        - ABSENT
      description: Status of a user's registration for an event

    EventStatus:
      type: string
      enum:
        - PENDING
        - APPROVED
        - REJECTED
      description: Status of an event

    UserEventRequest:
      type: object
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/UserEventStatus'
        note:
          type: string
          nullable: true
          description: Optional note/comment

    UserEventResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: string
        eventId:
          type: integer
          format: int64
        status:
          $ref: '#/components/schemas/UserEventStatus'
        note:
          type: string
          nullable: true
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    RegistrationResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: string
        eventId:
          type: integer
          format: int64
        status:
          $ref: '#/components/schemas/UserEventStatus'
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    EventRegistrationCount:
      type: object
      properties:
        eventId:
          type: integer
          format: int64
        registrationCount:
          type: integer
          format: int64
        participantCount:
          type: integer
          format: int64

    UserEventExport:
      type: object
      properties:
        id:
          type: integer
          format: int64
        eventId:
          type: integer
          format: int64
        userId:
          type: string
        status:
          type: string
        note:
          type: string
          nullable: true
        registeredAt:
          type: string
          format: date-time

    PageResponseUserEventResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/UserEventResponse'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        number:
          type: integer
        size:
          type: integer

    PageResponseEventRegistrationCount:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/EventRegistrationCount'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        number:
          type: integer
        size:
          type: integer

    MapStringLong:
      type: object
      additionalProperties:
        type: integer
        format: int64

paths:
  /api/v1/event_snapshot/{ownerId}/total_events_each:
    get:
      tags: [EventSnapshot]
      summary: Count total events for a manager
      operationId: countEventsPerManager
      parameters:
        - name: ownerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Total events count
          content:
            application/json:
              schema:
                type: integer
                format: int64
      security:
        - bearerAuth: []

  /api/v1/event_snapshot/{ownerId}/current_active_events_each:
    get:
      tags: [EventSnapshot]
      summary: Count currently active events for a manager
      operationId: countActiveEventsPerManager
      parameters:
        - name: ownerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Active events count
          content:
            application/json:
              schema:
                type: integer
                format: int64
      security:
        - bearerAuth: []

  /api/v1/registrations:
    get:
      tags: [Registrations]
      summary: List all registrations for authenticated user (paged)
      operationId: findAllByUserId
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/UserEventStatus'
        - name: pageNum
          in: query
          schema:
            type: integer
        - name: pageSize
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Paged user registrations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseUserEventResponse'
      security:
        - bearerAuth: []

  /api/v1/registrations/events/{eventId}/user-ids:
    get:
      tags: [Registrations]
      summary: Get user ids for an event (for current authenticated user)
      operationId: findUserIdsByEventId_v1
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/UserEventStatus'
        - name: pageNum
          in: query
          schema:
            type: integer
        - name: pageSize
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Array of user ids
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
      security:
        - bearerAuth: []

  /api/v1/registrations/events/{eventId}/participants:
    get:
      tags: [Registrations]
      summary: List all participants for an event (paged)
      operationId: findAllParticipants
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: pageNum
          in: query
          schema:
            type: integer
        - name: pageSize
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Paged participants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseUserEventResponse'
      security:
        - bearerAuth: []

  /api/v1/registrations/events/{eventId}/isParticipant:
    get:
      tags: [Registrations]
      summary: Check if authenticated user is participant of event
      operationId: checkIsParticipant
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: true if participant, false otherwise
          content:
            application/json:
              schema:
                type: boolean
      security:
        - bearerAuth: []

  /api/v1/registrations/events/{eventId}/status:
    get:
      tags: [Registrations]
      summary: Get registration status for authenticated user
      operationId: getStatus
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Registration status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEventStatus'
      security:
        - bearerAuth: []

  /api/v1/registrations/events/{eventId}:
    get:
      tags: [Registrations]
      summary: List registrations by event id (paged)
      operationId: findAllByEventId
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/UserEventStatus'
        - name: pageNum
          in: query
          schema:
            type: integer
        - name: pageSize
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Paged registrations for event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseUserEventResponse'
      security:
        - bearerAuth: []

    post:
      tags: [Registrations]
      summary: Register authenticated user for an event
      operationId: userEventRegister
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '201':
          description: Registration created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEventResponse'
      security:
        - bearerAuth: []

    delete:
      tags: [Registrations]
      summary: Delete registration for authenticated user
      operationId: deleteUserEventRegister
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Registration deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEventResponse'
      security:
        - bearerAuth: []

  /api/v1/registrations/events/registration-count:
    get:
      tags: [Registrations]
      summary: Get registration counts for events
      operationId: getEventsParticipantCounts
      parameters:
        - name: eventIds
          in: query
          schema:
            type: array
            items:
              type: integer
              format: int64
        - name: pageNum
          in: query
          schema:
            type: integer
        - name: pageSize
          in: query
          schema:
            type: integer
        - name: days
          in: query
          schema:
            type: integer
          description: Optional - filter events from past N days
      responses:
        '200':
          description: Event registration counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseEventRegistrationCount'
      security:
        - bearerAuth: []

  /api/v1/registrations/events/{eventId}/participants/{participantId}:
    put:
      tags: [Registrations]
      summary: Manager reviews participant registration
      operationId: reviewUserEventRegistration
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: participantId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserEventRequest'
      responses:
        '200':
          description: Registration reviewed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEventResponse'
      security:
        - bearerAuth: []

    delete:
      tags: [Registrations]
      summary: Manager removes participant registration
      operationId: managerDeleteUserEventRegister
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: participantId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Registration removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEventResponse'
      security:
        - bearerAuth: []

  /api/v1/registrations/internal/manager:
    get:
      tags: [Registrations]
      summary: Internal endpoint - get registrations for manager
      operationId: getRegistrationsByOwnerId
      parameters:
        - name: eventId
          in: query
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/UserEventStatus'
        - name: pageNum
          in: query
          schema:
            type: integer
            default: 0
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: List of registrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RegistrationResponse'
      security:
        - bearerAuth: []

  /api/v1/registrations/application_rate:
    get:
      tags: [Registrations]
      summary: Get application rate (ADMIN or MANAGER only)
      operationId: getApplicationRate
      responses:
        '200':
          description: Application rate
          content:
            application/json:
              schema:
                type: integer
                format: int64
      security:
        - bearerAuth: []

  /api/v1/registrations/approved_rate:
    get:
      tags: [Registrations]
      summary: Get approved rate (ADMIN or MANAGER only)
      operationId: getApprovedRate
      responses:
        '200':
          description: Approved rate
          content:
            application/json:
              schema:
                type: integer
                format: int64
      security:
        - bearerAuth: []

  /api/v1/registrations/export-all:
    get:
      tags: [Registrations]
      summary: Export all registrations (ADMIN only)
      operationId: exportAllRegistrations
      responses:
        '200':
          description: All registrations for export
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserEventExport'
      security:
        - bearerAuth: []

  /api/v1/registrations/event/{eventId}/export:
    get:
      tags: [Registrations]
      summary: Export participants for event (CSV or JSON)
      operationId: exportParticipants
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: format
          in: query
          schema:
            type: string
            enum: [csv, json]
            default: csv
      responses:
        '200':
          description: File download (CSV or JSON)
          headers:
            Content-Disposition:
              description: Attachment with filename
              schema:
                type: string
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: string
                format: binary
      security:
        - bearerAuth: []

  /api/v1/registrations/my-stats/participated-events:
    get:
      tags: [Registrations]
      summary: Count total participated events for user
      operationId: getMyTotalParticipatedEvents
      responses:
        '200':
          description: Count of participated events
          content:
            application/json:
              schema:
                type: integer
                format: int64
      security:
        - bearerAuth: []

  /api/v1/registrations/my-stats/status-events:
    get:
      tags: [Registrations]
      summary: Count stats grouped by status for user
      operationId: countStatsUserId
      responses:
        '200':
          description: Map of status -> count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MapStringLong'
      security:
        - bearerAuth: []

  /api/v1/registrations/events/{eventId}/participant-ids:
    get:
      tags: [System]
      summary: Find all participant user ids for event
      operationId: findAllUserIdsByEventId
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Array of user ids
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

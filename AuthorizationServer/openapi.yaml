openapi: 3.0.3
info:
  title: VolunteerHub Authorization Server API
  version: 0.0.1
  description: |
    OpenAPI specification for the VolunteerHub AuthorizationServer service.

    This service combines custom user registration endpoints with Spring
    Authorization Server OAuth2/OpenID Connect endpoints. OAuth2 endpoints use
    the Authorization Code flow and a registered client authenticated with
    `client_secret_basic`.
servers:
  - url: http://localhost:{port}
    description: Local AuthorizationServer instance
    variables:
      port:
        default: "9000"
        description: Value of the PORT environment variable.
tags:
  - name: Users
    description: Custom user account endpoints.
  - name: Authentication
    description: Form login and logout endpoints.
  - name: OAuth2
    description: OAuth2 Authorization Server endpoints.
  - name: OIDC
    description: OpenID Connect endpoints.
paths:
  /api/v1/users/register:
    post:
      tags:
        - Users
      summary: Register a user
      description: Creates a new user and stores the password as a BCrypt hash.
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
            examples:
              default:
                value:
                  username: user@example.com
                  name: Nguyen Van A
                  email: user@example.com
                  password: secret123
                  roles: USER
      responses:
        "201":
          description: User created.
          content:
            text/plain:
              schema:
                type: string
                example: User created!
        "400":
          description: Invalid request or duplicated username/email detected by service validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetails"
              examples:
                usernameExists:
                  value:
                    message: Username already exists
                emailExists:
                  value:
                    message: Email already exists
        "409":
          description: Database constraint violation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetails"

  /login:
    get:
      tags:
        - Authentication
      summary: Show login page
      operationId: getLoginPage
      security: []
      responses:
        "200":
          description: Thymeleaf HTML login page.
          content:
            text/html:
              schema:
                type: string
    post:
      tags:
        - Authentication
      summary: Submit form login
      description: |
        Spring Security form login endpoint. The login form submits `username`,
        `password`, optional `remember-me`, and the CSRF token generated by
        Spring Security.
      operationId: submitLogin
      security:
        - csrfCookie: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  description: Login identifier. The UI label is email, but the backend authenticates through the username field.
                  example: user@example.com
                password:
                  type: string
                  format: password
                  example: secret123
                remember-me:
                  type: string
                  description: Optional remember-me flag from the login form.
                  example: "on"
                _csrf:
                  type: string
                  description: CSRF token generated on the login page.
      responses:
        "302":
          description: Redirect after successful or failed form login.
          headers:
            Location:
              schema:
                type: string
        "200":
          description: Login may return an HTML page depending on Spring Security handling.
          content:
            text/html:
              schema:
                type: string

  /logout:
    post:
      tags:
        - Authentication
      summary: Logout current session
      operationId: logout
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Session invalidated and JSESSIONID deleted.

  /.well-known/oauth-authorization-server:
    get:
      tags:
        - OAuth2
      summary: OAuth2 authorization server metadata
      operationId: getOAuth2AuthorizationServerMetadata
      security: []
      responses:
        "200":
          description: OAuth2 authorization server metadata document.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuth2AuthorizationServerMetadata"

  /.well-known/openid-configuration:
    get:
      tags:
        - OIDC
      summary: OpenID Connect provider configuration
      operationId: getOpenIdProviderConfiguration
      security: []
      responses:
        "200":
          description: OpenID Connect discovery document.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenIdProviderConfiguration"

  /oauth2/authorize:
    get:
      tags:
        - OAuth2
      summary: Start OAuth2 authorization
      description: |
        Authorization endpoint for the Authorization Code flow. Unauthenticated
        users are redirected to `/login`.
      operationId: authorize
      security:
        - sessionCookie: []
      parameters:
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum:
              - code
          example: code
        - name: client_id
          in: query
          required: true
          schema:
            type: string
          example: volunteer-hub-client
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
            format: uri
          example: http://localhost:3000/login/oauth2/code/volunteer-hub
        - name: scope
          in: query
          required: true
          schema:
            type: string
          example: openid
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: nonce
          in: query
          required: false
          schema:
            type: string
          description: Recommended for OpenID Connect requests.
      responses:
        "302":
          description: Redirect to login page, consent page, or client redirect URI with authorization code/error.
          headers:
            Location:
              schema:
                type: string

  /oauth2/token:
    post:
      tags:
        - OAuth2
      summary: Exchange authorization code for tokens
      operationId: token
      security:
        - clientSecretBasic: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - grant_type
                - code
                - redirect_uri
              properties:
                grant_type:
                  type: string
                  enum:
                    - authorization_code
                  example: authorization_code
                code:
                  type: string
                  description: Authorization code returned by `/oauth2/authorize`.
                redirect_uri:
                  type: string
                  format: uri
                  description: Must match the registered redirect URI.
                code_verifier:
                  type: string
                  description: PKCE verifier when the authorization request used a code challenge.
      responses:
        "200":
          description: Token response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: OAuth2 token error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuth2Error"
        "401":
          description: Client authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuth2Error"

  /oauth2/jwks:
    get:
      tags:
        - OAuth2
      summary: Get JSON Web Key Set
      operationId: getJwks
      security: []
      responses:
        "200":
          description: Public keys used to verify JWT tokens issued by this server.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonWebKeySet"

  /oauth2/introspect:
    post:
      tags:
        - OAuth2
      summary: Introspect a token
      operationId: introspectToken
      security:
        - clientSecretBasic: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                token_type_hint:
                  type: string
                  enum:
                    - access_token
                    - refresh_token
      responses:
        "200":
          description: Token introspection result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenIntrospectionResponse"
        "401":
          description: Client authentication failed.

  /oauth2/revoke:
    post:
      tags:
        - OAuth2
      summary: Revoke a token
      operationId: revokeToken
      security:
        - clientSecretBasic: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                token_type_hint:
                  type: string
                  enum:
                    - access_token
                    - refresh_token
      responses:
        "200":
          description: Token revoked or token was already invalid.
        "401":
          description: Client authentication failed.

  /userinfo:
    get:
      tags:
        - OIDC
      summary: Get OpenID Connect user info
      operationId: getUserInfo
      security:
        - bearerAuth: []
      responses:
        "200":
          description: UserInfo claims for the authenticated subject.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfoResponse"
        "401":
          description: Missing or invalid bearer token.

  /connect/logout:
    get:
      tags:
        - OIDC
      summary: OpenID Connect logout
      operationId: oidcLogout
      security:
        - sessionCookie: []
      parameters:
        - name: id_token_hint
          in: query
          required: false
          schema:
            type: string
        - name: post_logout_redirect_uri
          in: query
          required: false
          schema:
            type: string
            format: uri
        - name: state
          in: query
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirect after OIDC logout.
          headers:
            Location:
              schema:
                type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    clientSecretBasic:
      type: http
      scheme: basic
      description: HTTP Basic authentication using the registered OAuth2 client id and client secret.
    sessionCookie:
      type: apiKey
      in: cookie
      name: JSESSIONID
    csrfCookie:
      type: apiKey
      in: cookie
      name: XSRF-TOKEN

  schemas:
    CreateUserRequest:
      type: object
      required:
        - username
        - name
        - password
        - email
      properties:
        username:
          type: string
          minLength: 1
          example: user@example.com
        name:
          type: string
          minLength: 1
          example: Nguyen Van A
        password:
          type: string
          format: password
          minLength: 1
          example: secret123
        email:
          type: string
          format: email
          example: user@example.com
        roles:
          $ref: "#/components/schemas/Role"
      additionalProperties: false

    Role:
      type: string
      enum:
        - USER
        - ADMIN
        - MANAGER
      default: USER

    ErrorDetails:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT access token. The service customizes claims with `user_id`, `email`, `roles`, and `name`.
        id_token:
          type: string
          description: OpenID Connect ID token when the `openid` scope is granted.
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          format: int64
          description: Access token lifetime in seconds. The service config sets access tokens to 24 hours.
          example: 86400
        scope:
          type: string
          example: openid
      required:
        - access_token
        - token_type
        - expires_in

    OAuth2Error:
      type: object
      properties:
        error:
          type: string
          example: invalid_grant
        error_description:
          type: string
        error_uri:
          type: string
          format: uri
      required:
        - error

    JsonWebKeySet:
      type: object
      properties:
        keys:
          type: array
          items:
            $ref: "#/components/schemas/JsonWebKey"
      required:
        - keys

    JsonWebKey:
      type: object
      properties:
        kty:
          type: string
          example: RSA
        kid:
          type: string
        use:
          type: string
        alg:
          type: string
        n:
          type: string
        e:
          type: string

    TokenIntrospectionResponse:
      type: object
      properties:
        active:
          type: boolean
        sub:
          type: string
        client_id:
          type: string
        username:
          type: string
        scope:
          type: string
        token_type:
          type: string
        exp:
          type: integer
          format: int64
        iat:
          type: integer
          format: int64
        nbf:
          type: integer
          format: int64
        aud:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        iss:
          type: string
      required:
        - active

    UserInfoResponse:
      type: object
      properties:
        sub:
          type: string
          description: Subject identifier. Access tokens use the user UUID as subject.
        name:
          type: string
        email:
          type: string
          format: email
        user_id:
          type: string
          format: uuid
        roles:
          type: array
          items:
            type: object
            properties:
              authority:
                type: string
                example: USER

    OAuth2AuthorizationServerMetadata:
      type: object
      properties:
        issuer:
          type: string
          format: uri
        authorization_endpoint:
          type: string
          format: uri
        token_endpoint:
          type: string
          format: uri
        jwks_uri:
          type: string
          format: uri
        revocation_endpoint:
          type: string
          format: uri
        introspection_endpoint:
          type: string
          format: uri
        response_types_supported:
          type: array
          items:
            type: string
        grant_types_supported:
          type: array
          items:
            type: string
        token_endpoint_auth_methods_supported:
          type: array
          items:
            type: string

    OpenIdProviderConfiguration:
      allOf:
        - $ref: "#/components/schemas/OAuth2AuthorizationServerMetadata"
        - type: object
          properties:
            userinfo_endpoint:
              type: string
              format: uri
            end_session_endpoint:
              type: string
              format: uri
            subject_types_supported:
              type: array
              items:
                type: string
            id_token_signing_alg_values_supported:
              type: array
              items:
                type: string
            scopes_supported:
              type: array
              items:
                type: string
            claims_supported:
              type: array
              items:
                type: string

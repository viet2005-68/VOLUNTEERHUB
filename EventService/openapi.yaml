openapi: 3.0.3
info:
  title: Event Service API
  version: 1.0.0
  description: API for managing events

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /api/v1/events:
    get:
      summary: Get all events
      parameters:
        - name: pageNum
          in: query
          schema:
            type: integer
            format: int32
        - name: pageSize
          in: query
          schema:
            type: integer
            format: int32
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, APPROVED, REJECTED]
        - name: category
          in: query
          schema:
            type: string
        - name: startAfter
          in: query
          schema:
            type: string
            format: date-time
        - name: endBefore
          in: query
          schema:
            type: string
            format: date-time
        - name: province
          in: query
          schema:
            type: string
        - name: district
          in: query
          schema:
            type: string
        - name: street
          in: query
          schema:
            type: string
        - name: sortedBy
          in: query
          schema:
            type: string
            default: id
        - name: order
          in: query
          schema:
            type: string
            default: desc
            enum: [asc, desc]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageEventResponse'
    post:
      summary: Create a new event
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                eventRequest:
                  $ref: '#/components/schemas/EventRequest'
                imageFile:
                  type: string
                  format: binary
                  description: Image file for the event
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '400':
          description: Bad request

  /api/v1/events/{eventId}:
    get:
      summary: Get event by ID
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '404':
          description: Event not found
    put:
      summary: Update an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                eventRequest:
                  $ref: '#/components/schemas/EventRequest'
                imageFile:
                  type: string
                  format: binary
                  description: Image file for the event
      responses:
        '200':
          description: Event updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '404':
          description: Event not found
    delete:
      summary: Delete an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Event deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '404':
          description: Event not found

  /api/v1/events/{eventId}/approve:
    patch:
      summary: Approve an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Event approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '404':
          description: Event not found

  /api/v1/events/{eventId}/reject:
    patch:
      summary: Reject an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectRequest'
      responses:
        '200':
          description: Event rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '404':
          description: Event not found

components:
  schemas:
    EventResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        category:
          $ref: '#/components/schemas/CategoryResponse'
        address:
          $ref: '#/components/schemas/AddressResponse'
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        registrationDeadline:
          type: string
          format: date-time
        capacity:
          type: integer
          format: int32
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
        ownerId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        approvedBy:
          type: string
        optional:
          type: string

    CategoryResponse:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    AddressResponse:
      type: object
      properties:
        province:
          type: string
        district:
          type: string
        street:
          type: string

    EventRequest:
      type: object
      required:
        - name
        - categoryName
        - startTime
        - endTime
        - registrationDeadline
        - address
        - capacity
      properties:
        name:
          type: string
        description:
          type: string
        categoryName:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        registrationDeadline:
          type: string
          format: date-time
        address:
          $ref: '#/components/schemas/AddressRequest'
        optional:
          type: string
        capacity:
          type: integer
          format: int32
          minimum: 1

    AddressRequest:
      type: object
      required:
        - province
        - district
        - street
      properties:
        province:
          type: string
        district:
          type: string
        street:
          type: string

    RejectRequest:
      type: object
      properties:
        reason:
          type: string

    PageEventResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/EventResponse'
        pageable:
          type: object
          properties:
            pageNumber:
              type: integer
            pageSize:
              type: integer
            sort:
              type: object
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        first:
          type: boolean
        last:
          type: boolean
        empty:
          type: boolean